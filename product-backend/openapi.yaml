openapi: 3.0.3
info:
  title: Product Management API
  version: 1.0.0
  description: CRUD API for Product resource with MongoDB/Mongoose integration.
servers:
  - url: http://localhost:3000
paths:
  /products:
    get:
      summary: List products
      tags:
        - Product
      responses:
        '200':
          description: Product list returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
    post:
      summary: Create a new product
      tags:
        - Product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
  /products/{id}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      summary: Get a product by ID
      tags:
        - Product
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update a product by ID
      tags:
        - Product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateRequest'
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a product by ID
      tags:
        - Product
      responses:
        '204':
          description: Product deleted successfully
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    ProductId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: MongoDB product ID
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
          example: 647d9f1c2b0f4e6e4fed1234
        name:
          type: string
          example: Apple MacBook Pro
        description:
          type: string
          example: Laptop for development and design
        price:
          type: number
          format: float
          example: 2499.99
        inStock:
          type: boolean
          example: true
        tags:
          type: array
          items:
            type: string
          example: [laptop, apple, pro]
      required:
        - id
        - name
        - price
        - inStock
    ProductCreateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        inStock:
          type: boolean
        tags:
          type: array
          items:
            type: string
      required:
        - name
        - price
        - inStock
    ProductUpdateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        inStock:
          type: boolean
        tags:
          type: array
          items:
            type: string
    ProductResponse:
      type: object
      properties:
        product:
          $ref: '#/components/schemas/Product'
    ProductListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
